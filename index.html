<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панда Кликер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="level">LVL 12</div>
            <div class="balance">⭐ <span id="balance">4600</span></div>
        </header>

        <!-- Основной контент -->
        <main class="content" id="main-content"></main>

        <!-- Нижняя панель — только 3 кнопки -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="game">🎮<br><span>Игры</span></button>
            <button class="nav-item" data-page="shop">🛒<br><span>Магазин</span></button>
            <button class="nav-item" data-page="profile">👤<br><span>Профиль</span></button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
