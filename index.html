<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panda Stars</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<div class="title">
🐼 Panda Stars
</div>


<div class="stars">
⭐ <span id="balance">100</span>
</div>


</header>





<div class="content">



<section id="home" class="page active">


<h1>
🎁 Кейсы
</h1>



<div class="case">


<div class="case-img">
🎁
</div>


<h2>
Бесплатный кейс
</h2>


<p>
Открывай раз в 24 часа
</p>


<div id="caseTimer">
Доступен сейчас
</div>



<button onclick="openCase()">
Открыть
</button>



<div id="caseResult"></div>


</div>


</section>








<section id="games" class="page">


<h1>
🎮 Игры
</h1>


<div class="card">

💣 Минное поле

<br>

Скоро

</div>


</section>








<section id="profile" class="page">


<h1>
👤 Профиль
</h1>


<div class="card">


Баланс:

<br>

⭐ <span id="profileBalance">
100
</span>



<br><br>


Открыто кейсов:

<br>


<span id="opened">
0
</span>


</div>


</section>



</div>






<nav>


<button onclick="openPage('home')">

🎁

<span>
Кейсы
</span>


</button>



<button onclick="openPage('games')">

🎮

<span>
Игры
</span>


</button>




<button onclick="openPage('profile')">

👤

<span>
Профиль
</span>


</button>



</nav>






</div>



<script src="scripts.js"></script>


</body>
</html>
