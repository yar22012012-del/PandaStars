<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панда Кликер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header как на фото -->
        <header class="header">
            <div class="header-left">LVL</div>
            <div class="header-icons">
                <span>🎁</span>
                <span>📦</span>
                <span>⭐ 4600</span>
                <span>⚡</span>
                <span>🎉</span>
            </div>
            <div class="header-right">
                ⭐ 5 <button class="plus-btn">+</button>
            </div>
        </header>

        <!-- Контент с карточками -->
        <main class="content" id="main-content">
            <!-- Заполняется через JS -->
        </main>

        <!-- Нижняя панель — 3 кнопки -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="game">
                🎮<br><span>Игры</span>
            </button>
            <button class="nav-item" data-page="shop">
                🛒<br><span>Магазин</span>
            </button>
            <button class="nav-item" data-page="profile">
                👤<br><span>Профиль</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
