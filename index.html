<!DOCTYPE html>

<body>


<div class="app">


    <!-- Раздел игры -->

    <section class="games">


        <h1>
            Игры

        <div class="game-card" onclick="openCase()">

            </div>



            <div class="game-text">


                <h2>

            </div>


        </div>



    </section>



</div>





<!-- Нижнее меню -->

        <div class="menu-icon">
            🎮

        </span>


    </div>




    <div class="menu-item">


        <div class="menu-icon">
            🛒

    </div>





    <div class="menu-item">


        <div class="menu-icon">
