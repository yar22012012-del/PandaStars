<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панда Кликер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="lvl">LVL</div>
            <div class="header-icons">🎁📦⭐4600⚡🎉</div>
            <div class="balance">⭐5 <button class="plus">+</button></div>
        </header>

        <main class="content" id="main-content"></main>

        <!-- Кнопки как на фото -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="game">
                🎮<br><span>Игры</span>
            </button>
            <button class="nav-item" data-page="shop">
                🛒<br><span>Магазин</span>
            </button>
            <button class="nav-item" data-page="profile">
                👤<br><span>Профиль</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
