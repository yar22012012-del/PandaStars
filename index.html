<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panda Stars</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header class="top">


<div class="logo">
🐼 Panda Stars
</div>


<div class="balance">

⭐ <span id="stars">100</span>

</div>


</header>





<main>



<section id="cases" class="page active">


<h1>
🎁 Кейсы
</h1>



<div class="case-card">


<div class="case-image">
🎁
</div>



<div class="case-info">


<h2>
Бесплатный кейс
</h2>


<p>
Открывай бесплатный кейс один раз в 24 часа
</p>


<button onclick="openCase()">

Открыть

</button>


</div>


</div>


</section>









<section id="games" class="page">


<h1>
🎮 Игры
</h1>



<div class="game-card"
onclick="openMine()">



<div class="game-icon">
💣
</div>


<div>


<h2>
Минное поле
</h2>


<p>
Умножай свою ставку
</p>


</div>


</div>


</section>









<section id="profile" class="page">


<h1>
👤 Профиль
</h1>


<div class="profile-box">


<h2>
Игрок
</h2>


<p>
Баланс:
⭐ <span id="profileStars">
100
</span>
</p>



<p>
Открыто кейсов:
<span id="opened">
0
</span>
</p>



<p>
Побед:
<span id="wins">
0
</span>
</p>



</div>



</section>







<section id="mine" class="page">


<h1>
💣 Минное поле
</h1>


<div class="mine-box">


<input 
id="bet"
placeholder="Ставка от 15 Stars"
type="number">


<button onclick="startMine()">
Начать
</button>



<div id="field"></div>


<button onclick="takeMoney()">
Забрать выигрыш
</button>


<h2 id="result"></h2>


</div>


</section>




</main>








<nav class="bottom-nav">


<button onclick="changePage('cases')">

🎁
<span>
Кейсы
</span>

</button>




<button onclick="changePage('games')">

🎮

<span>
Игры
</span>

</button>





<button onclick="changePage('profile')">

👤

<span>
Профиль
</span>

</button>


</nav>





</div>



<script src="scripts.js"></script>


</body>

</html>
