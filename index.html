<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panda Stars</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<div class="logo">
🐼 Panda Stars
</div>


<div class="balance">
⭐ <span id="balance">100</span>
</div>

</header>





<main>


<section id="cases" class="screen active">


<h1>
🎁 Бесплатный кейс
</h1>




<div class="case-box">


<div class="case-icon">
🎁
</div>



<h2>
Бесплатный кейс
</h2>



<p id="timer">

Доступен сейчас

</p>



<button id="openButton" onclick="openCase()">

Открыть кейс

</button>



<div id="result">

</div>



</div>








<div class="rewards">


<h2>
Награды
</h2>



<div class="reward-container">


<div class="reward">
⭐⭐
<br>
2 Stars
</div>


<div class="reward">
⭐⭐⭐
<br>
3 Stars
</div>


<div class="reward">
⭐
<br>
1 Star
</div>


<div class="reward">
⭐⭐⭐⭐⭐
<br>
5 Stars
</div>


<div class="reward">
⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
<br>
11 Stars
</div>


<div class="reward rare">
⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
<br>
17 Stars
</div>


<div class="reward nft">
🎁
<br>
Telegram NFT
</div>


</div>

</div>



</section>








<section id="games" class="screen">


<h1>
🎮 Игры
</h1>


<div class="empty">

Скоро появятся игры

</div>


</section>







<section id="profile" class="screen">


<h1>
👤 Профиль
</h1>



<div class="profile">


<p>
Баланс:
⭐ <span id="profileBalance">
100
</span>
</p>



<p>
Открыто кейсов:
<span id="opened">
0
</span>
</p>


</div>


</section>




</main>








<nav>


<button onclick="changeScreen('cases')">

🎁
<span>
Кейсы
</span>

</button>



<button onclick="changeScreen('games')">

🎮
<span>
Игры
</span>

</button>



<button onclick="changeScreen('profile')">

👤
<span>
Профиль
</span>

</button>


</nav>



</div>



<script src="scripts.js"></script>


</body>

</html>
